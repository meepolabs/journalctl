# This is a snippet, not a standalone file.
# Paste into the http {} block of the main nginx config.

# Rate limiting for login endpoint (5 requests/minute per IP)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=oauth_limit:10m rate=30r/m;

upstream journalctl {
    server 127.0.0.1:8100;
}

upstream journal_mkdocs {
    server 127.0.0.1:8300;
}

server {
    server_name _;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # OAuth endpoints — auth handled by the app, must come before MkDocs catch-all
    location ~ ^/(\.well-known/(oauth-authorization-server|oauth-protected-resource)|authorize|token|register|revoke) {
        limit_req zone=oauth_limit burst=10 nodelay;
        proxy_pass http://journalctl;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login endpoint — rate limited (5 req/min per IP), strict CSP
    location = /login {
        limit_req zone=login_limit burst=3 nodelay;
        # CSP set by the application with per-request nonce
        proxy_pass http://journalctl/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP endpoint — Bearer token auth handled by the app
    # Prefix match catches both /mcp and /mcp/ — path normalization
    # handled by MCPPathNormalizer middleware in the application
    location /mcp {
        proxy_pass http://journalctl;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE streaming (MCP transport)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Health check (unprotected)
    location /health {
        proxy_pass http://journalctl/health;
    }

    # MkDocs journal browser (password protected)
    location / {
        auth_basic "Journal";
        auth_basic_user_file /etc/nginx/.htpasswd_journal;
        proxy_pass http://journal_mkdocs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SSL managed by certbot
}

server {
    server_name _;
    listen 80;
    return 301 https://$host$request_uri;
}
