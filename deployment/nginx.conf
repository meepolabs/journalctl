# This is a snippet, not a standalone file.

upstream journalctl {
    server 127.0.0.1:8100;
}

upstream journal_mkdocs {
    server 127.0.0.1:8300;
}

server {
    server_name _;

    # MCP endpoint — Bearer token auth handled by the app
    location /mcp/ {
        proxy_pass http://journalctl/mcp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE streaming (MCP transport)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Health check (unprotected)
    location /health {
        proxy_pass http://journalctl/health;
    }

    # MkDocs journal browser (password protected)
    location / {
        auth_basic "Journal";
        auth_basic_user_file /etc/nginx/.htpasswd_journal;
        proxy_pass http://journal_mkdocs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SSL managed by certbot
}

server {
    server_name _;
    listen 80;
    return 301 https://$host$request_uri;
}
