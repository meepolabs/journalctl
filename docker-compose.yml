# Host environment must provide:
#   JOURNAL_HOST_PATH  — absolute path to journal repo on host
#   JOURNAL_API_KEY    — Bearer token for MCP auth
#   JOURNAL_TIMEZONE   — e.g. America/Los_Angeles
#
# Set these via Doppler, .env file, or export before running docker compose.

services:
  journalctl:
    container_name: journalctl
    build:
      context: .
      dockerfile: deployment/Dockerfile
    image: journalctl:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      - JOURNAL_API_KEY
      - JOURNAL_JOURNAL_ROOT=/app/journal/content
      - JOURNAL_DB_PATH=/app/journal/journal.db
      - JOURNAL_TRANSPORT=streamable-http
      - JOURNAL_TIMEZONE=${JOURNAL_TIMEZONE:-America/Los_Angeles}
      - JOURNAL_LOG_LEVEL=info
      - JOURNAL_LOG_DIR=/app/logs
      # OAuth
      - JOURNAL_SERVER_URL
      - JOURNAL_OWNER_PASSWORD_HASH
      - JOURNAL_OAUTH_DB_PATH
      # Memory service
      - JOURNAL_MEMORY_ENABLED=true
      - JOURNAL_MEMORY_DB_PATH=/app/journal/memory.db
      - MCP_CUSTOM_MEMORY_TYPES
    volumes:
      - ${JOURNAL_HOST_PATH:?Set JOURNAL_HOST_PATH to your journal repo}:/app/journal
      - ./logs:/app/logs
      - onnx-model-cache:/home/appuser/.cache/mcp_memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1024M   # gunicorn 2 workers + ONNX model (~80MB) + sqlite-vec
        reservations:
          memory: 512M    # baseline without cached embeddings

volumes:
  onnx-model-cache:
