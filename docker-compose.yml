# Host environment must provide:
#   JOURNAL_API_KEY           — Bearer token for MCP auth
#   JOURNAL_POSTGRES_PASSWORD — PostgreSQL password
#   JOURNAL_TIMEZONE          — e.g. America/Los_Angeles
#
# Set these via Doppler, .env file, or export before running docker compose.
#
# Local bind mounts under ./data/ — data survives `docker compose down -v`:
#   ./data/journal/   — conversations_json/, knowledge/
#   ./data/postgres/  — PostgreSQL WAL and data files
#   ./data/onnx/      — cached ONNX model (avoid re-download on recreate)

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: journalctl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: journal
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: ${JOURNAL_POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./deployment/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal -d journal"]
      interval: 10s
      timeout: 5s
      retries: 5

  journalctl:
    container_name: journalctl
    build:
      context: .
      dockerfile: deployment/Dockerfile
    image: journalctl:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      - JOURNAL_API_KEY
      - JOURNAL_DATABASE_URL=postgresql://journal:${JOURNAL_POSTGRES_PASSWORD}@postgres:5432/journal
      - JOURNAL_JOURNAL_ROOT=/app/journal
      - JOURNAL_TRANSPORT=streamable-http
      - JOURNAL_TIMEZONE=${JOURNAL_TIMEZONE:-America/Los_Angeles}
      - JOURNAL_LOG_LEVEL=info
      - JOURNAL_LOG_DIR=/app/logs
      # OAuth
      - JOURNAL_SERVER_URL
      - JOURNAL_OWNER_PASSWORD_HASH
      - JOURNAL_OAUTH_DB_PATH
    volumes:
      - ./data/journal:/app/journal
      - ./logs:/app/logs
      - ./data/onnx:/home/appuser/.cache/journalctl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
