# Host environment must provide:
#   JOURNAL_API_KEY               -- Bearer token for MCP auth (required unless
#                                    JOURNAL_HYDRA_ADMIN_URL is set)
#   JOURNAL_DB_SUPERUSER_PASSWORD -- PostgreSQL superuser bootstrap password
#                                    (initdb + healthcheck only; the app never
#                                    connects as this role)
#   JOURNAL_DB_APP_PASSWORD       -- runtime DB role password (journal_app)
#   JOURNAL_DB_ADMIN_PASSWORD     -- privileged DB role password (journal_admin)
#   JOURNAL_TIMEZONE              -- e.g. America/Los_Angeles
#
# Set these via Doppler, .env file, or export before running docker compose.
# See docs/deployment.md for the full 3-shape deploy matrix (API-key-only /
# full self-host / multi-tenant hosted).
#
# Local bind mounts under ./data/ -- data survives `docker compose down -v`:
#   ./data/journal/   -- conversations_json/, knowledge/, oauth.db
#   ./data/postgres/  -- PostgreSQL WAL and data files
#   ./data/onnx/      -- cached ONNX model (avoid re-download on recreate)

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: journalctl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: journal
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: ${JOURNAL_DB_SUPERUSER_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./deployment/scripts/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal -d journal"]
      interval: 10s
      timeout: 5s
      retries: 5

  journalctl:
    container_name: journalctl
    build:
      context: .
      dockerfile: deployment/Dockerfile
    image: journalctl:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      - JOURNAL_API_KEY
      # Runtime pool uses `journal_app` (created by migration 0002). The
      # default `journal` superuser from POSTGRES_USER is used only for
      # initdb and the pg_isready healthcheck -- see migration 0002 + 0005
      # for the role/RLS setup.
      - JOURNAL_DB_APP_URL=postgresql://journal_app:${JOURNAL_DB_APP_PASSWORD}@postgres:5432/journal
      - JOURNAL_DB_ADMIN_URL=postgresql://journal_admin:${JOURNAL_DB_ADMIN_PASSWORD}@postgres:5432/journal
      # Migrations run under the admin role; alembic resolves this first,
      # falling back to JOURNAL_DB_ADMIN_URL. The app role lacks DDL.
      - JOURNAL_DB_MIGRATION_URL=postgresql://journal_admin:${JOURNAL_DB_ADMIN_PASSWORD}@postgres:5432/journal
      - JOURNAL_DATA_DIR=/app/journal
      - JOURNAL_TRANSPORT=streamable-http
      - JOURNAL_TIMEZONE=${JOURNAL_TIMEZONE:-America/Los_Angeles}
      - JOURNAL_LOG_LEVEL=info
      - JOURNAL_LOG_DIR=/app/logs
      # Operator identity + encryption (multi-tenant auth)
      - JOURNAL_OPERATOR_EMAIL
      - JOURNAL_ENCRYPTION_MASTER_KEY_V1
      # Hydra introspection (leave empty to disable Hydra auth path).
      # Mutually exclusive with JOURNAL_PASSWORD_HASH -- setting both fails startup.
      # PUBLIC_ISSUER_URL is the external HTTPS issuer (auth-dev.meepolabs.com)
      # advertised to MCP clients; both must be set together for Mode 3.
      # PUBLIC_URL is the Hydra base used for JIT /userinfo calls (provisioning);
      # both must be set together -- see config.py _validate_deploy_shape.
      - JOURNAL_HYDRA_ADMIN_URL
      - JOURNAL_HYDRA_PUBLIC_ISSUER_URL
      - JOURNAL_HYDRA_PUBLIC_URL
      # Self-host OAuth (leave empty for API-key-only deploys)
      - JOURNAL_SERVER_URL
      - JOURNAL_PASSWORD_HASH
    networks:
      - default
      - auth
    volumes:
      - ./data/journal:/app/journal
      - ./logs:/app/logs
      - ./data/onnx:/home/appuser/.cache/journalctl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

networks:
  default:
  auth:
    external: true
    name: journalctl-auth
