<svg width="720" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">
  <style>
    .box-teal { fill: #e0f2f1; stroke: #80cbc4; stroke-width: 1; }
    .box-purple { fill: #f3e5f5; stroke: #ce93d8; stroke-width: 1; }
    .box-gray { fill: #f1f3f5; stroke: #ced4da; stroke-width: 1; }
    .title { font-size: 14px; font-weight: 600; fill: #212529; }
    .subtitle { font-size: 12px; fill: #6c757d; }
    .label { font-size: 11px; fill: #868e96; }
    .row-label { font-size: 13px; font-weight: 600; fill: #495057; }
    .status-ok { font-size: 12px; fill: #2e7d32; font-weight: 600; }
    .status-planned { font-size: 12px; fill: #f57f17; font-weight: 600; }
    .status-na { font-size: 12px; fill: #9e9e9e; }
  </style>

  <!-- Column headers -->
  <rect class="box-teal" x="40" y="20" width="200" height="42" rx="8"/>
  <text class="title" x="140" y="45" text-anchor="middle">Journal (journalctl)</text>

  <rect class="box-purple" x="260" y="20" width="200" height="42" rx="8"/>
  <text class="title" x="360" y="45" text-anchor="middle">Memory service</text>

  <rect class="box-gray" x="480" y="20" width="200" height="42" rx="8"/>
  <text class="title" x="580" y="45" text-anchor="middle">Traditional RAG</text>

  <!-- Row 1: Data type -->
  <text class="row-label" x="40" y="96">Data type</text>
  <rect class="box-teal" x="40" y="106" width="200" height="50" rx="6"/>
  <text class="subtitle" x="140" y="126" text-anchor="middle">Curated entries</text>
  <text class="subtitle" x="140" y="142" text-anchor="middle">+ full transcripts</text>

  <rect class="box-purple" x="260" y="106" width="200" height="50" rx="6"/>
  <text class="subtitle" x="360" y="126" text-anchor="middle">Atomic facts</text>
  <text class="subtitle" x="360" y="142" text-anchor="middle">+ entity relations</text>

  <rect class="box-gray" x="480" y="106" width="200" height="50" rx="6"/>
  <text class="subtitle" x="580" y="126" text-anchor="middle">Passive document</text>
  <text class="subtitle" x="580" y="142" text-anchor="middle">chunks (vectors)</text>

  <!-- Row 2: Search -->
  <text class="row-label" x="40" y="186">Search</text>
  <rect class="box-teal" x="40" y="196" width="200" height="50" rx="6"/>
  <text class="subtitle" x="140" y="216" text-anchor="middle">FTS5 keyword</text>
  <text class="subtitle" x="140" y="232" text-anchor="middle">Precise, predictable</text>

  <rect class="box-purple" x="260" y="196" width="200" height="50" rx="6"/>
  <text class="subtitle" x="360" y="216" text-anchor="middle">Semantic (embeddings)</text>
  <text class="subtitle" x="360" y="232" text-anchor="middle">Fuzzy, meaning-based</text>

  <rect class="box-gray" x="480" y="196" width="200" height="50" rx="6"/>
  <text class="subtitle" x="580" y="216" text-anchor="middle">Cosine similarity</text>
  <text class="subtitle" x="580" y="232" text-anchor="middle">Top-K retrieval</text>

  <!-- Row 3: Retrieval -->
  <text class="row-label" x="40" y="276">Retrieval</text>
  <rect class="box-teal" x="40" y="286" width="200" height="50" rx="6"/>
  <text class="subtitle" x="140" y="306" text-anchor="middle">LLM makes targeted</text>
  <text class="subtitle" x="140" y="322" text-anchor="middle">tool calls (agentic)</text>

  <rect class="box-purple" x="260" y="286" width="200" height="50" rx="6"/>
  <text class="subtitle" x="360" y="306" text-anchor="middle">LLM queries facts</text>
  <text class="subtitle" x="360" y="322" text-anchor="middle">by entity or topic</text>

  <rect class="box-gray" x="480" y="286" width="200" height="50" rx="6"/>
  <text class="subtitle" x="580" y="306" text-anchor="middle">Pipeline embeds query</text>
  <text class="subtitle" x="580" y="322" text-anchor="middle">→ nearest chunks</text>

  <!-- Row 4: Infra -->
  <text class="row-label" x="40" y="366">Infrastructure</text>
  <rect class="box-teal" x="40" y="376" width="200" height="50" rx="6"/>
  <text class="subtitle" x="140" y="396" text-anchor="middle">Markdown files</text>
  <text class="subtitle" x="140" y="412" text-anchor="middle">+ 1 SQLite file</text>

  <rect class="box-purple" x="260" y="376" width="200" height="50" rx="6"/>
  <text class="subtitle" x="360" y="396" text-anchor="middle">SQLite-vec</text>
  <text class="subtitle" x="360" y="412" text-anchor="middle">+ 1 SQLite file</text>

  <rect class="box-gray" x="480" y="376" width="200" height="50" rx="6"/>
  <text class="subtitle" x="580" y="396" text-anchor="middle">Vector DB + embedding</text>
  <text class="subtitle" x="580" y="412" text-anchor="middle">model + chunking pipeline</text>

  <!-- Row 5: Answers -->
  <text class="row-label" x="40" y="456">Answers</text>
  <rect class="box-teal" x="40" y="466" width="200" height="36" rx="6"/>
  <text class="subtitle" x="140" y="489" text-anchor="middle">"What happened? When?"</text>

  <rect class="box-purple" x="260" y="466" width="200" height="36" rx="6"/>
  <text class="subtitle" x="360" y="489" text-anchor="middle">"What is X? What do I prefer?"</text>

  <rect class="box-gray" x="480" y="466" width="200" height="36" rx="6"/>
  <text class="subtitle" x="580" y="489" text-anchor="middle">"What does this doc say?"</text>
</svg>
