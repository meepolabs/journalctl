<svg width="720" viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">
  <style>
    .box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
    .box-teal { fill: #e0f2f1; stroke: #80cbc4; stroke-width: 1; }
    .box-blue { fill: #e8f4fd; stroke: #90caf9; stroke-width: 1; }
    .box-green { fill: #e8f5e9; stroke: #81c784; stroke-width: 1; }
    .box-amber { fill: #fff8e1; stroke: #ffcc80; stroke-width: 1; }
    .title { font-size: 13px; font-weight: 600; fill: #212529; }
    .subtitle { font-size: 11px; fill: #6c757d; }
    .heading { font-size: 14px; font-weight: 600; fill: #212529; }
    .arr { stroke: #adb5bd; stroke-width: 1.2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Write path -->
  <text class="heading" x="20" y="24">Write path (journal_append)</text>
  <rect class="box-blue" x="20" y="36" width="150" height="36" rx="6"/>
  <text class="title" x="95" y="58" text-anchor="middle">LLM tool call</text>
  <line x1="170" y1="54" x2="200" y2="54" class="arr"/>

  <rect class="box-teal" x="200" y="36" width="130" height="36" rx="6"/>
  <text class="title" x="265" y="58" text-anchor="middle">Validate input</text>
  <line x1="330" y1="54" x2="360" y2="54" class="arr"/>

  <rect class="box-green" x="360" y="36" width="160" height="36" rx="6"/>
  <text class="title" x="440" y="52" text-anchor="middle">Lock → write .md</text>
  <text class="subtitle" x="440" y="66" text-anchor="middle">→ release lock</text>
  <line x1="520" y1="54" x2="550" y2="54" class="arr"/>

  <rect class="box-amber" x="550" y="36" width="140" height="36" rx="6"/>
  <text class="title" x="620" y="58" text-anchor="middle">Upsert FTS5</text>

  <!-- Read path -->
  <text class="heading" x="20" y="114">Read path (journal_read)</text>
  <rect class="box-blue" x="20" y="126" width="150" height="36" rx="6"/>
  <text class="title" x="95" y="148" text-anchor="middle">LLM tool call</text>
  <line x1="170" y1="144" x2="200" y2="144" class="arr"/>

  <rect class="box-green" x="200" y="126" width="190" height="36" rx="6"/>
  <text class="title" x="295" y="142" text-anchor="middle">Load .md → parse</text>
  <text class="subtitle" x="295" y="156" text-anchor="middle">YAML frontmatter + entries</text>
  <line x1="390" y1="144" x2="420" y2="144" class="arr"/>

  <rect class="box" x="420" y="126" width="180" height="36" rx="6"/>
  <text class="title" x="510" y="148" text-anchor="middle">Return metadata + entries</text>

  <!-- Search path -->
  <text class="heading" x="20" y="204">Search path (journal_search)</text>
  <rect class="box-blue" x="20" y="216" width="150" height="36" rx="6"/>
  <text class="title" x="95" y="238" text-anchor="middle">LLM tool call</text>
  <line x1="170" y1="234" x2="200" y2="234" class="arr"/>

  <rect class="box-amber" x="200" y="216" width="190" height="36" rx="6"/>
  <text class="title" x="295" y="232" text-anchor="middle">FTS5 MATCH query</text>
  <text class="subtitle" x="295" y="246" text-anchor="middle">+ topic/date filters</text>
  <line x1="390" y1="234" x2="420" y2="234" class="arr"/>

  <rect class="box" x="420" y="216" width="220" height="36" rx="6"/>
  <text class="title" x="530" y="238" text-anchor="middle">Results with highlighted snippets</text>

  <!-- Conversation save path -->
  <text class="heading" x="20" y="294">Conversation save path</text>
  <rect class="box-blue" x="20" y="306" width="150" height="36" rx="6"/>
  <text class="title" x="95" y="328" text-anchor="middle">LLM tool call</text>
  <line x1="170" y1="324" x2="200" y2="324" class="arr"/>

  <rect class="box-green" x="200" y="306" width="160" height="56" rx="6"/>
  <text class="title" x="280" y="326" text-anchor="middle">Write transcript .md</text>
  <text class="subtitle" x="280" y="342" text-anchor="middle">+ upsert summary</text>
  <text class="subtitle" x="280" y="356" text-anchor="middle">in topic file</text>
  <line x1="360" y1="334" x2="390" y2="334" class="arr"/>

  <rect class="box-amber" x="390" y="306" width="160" height="56" rx="6"/>
  <text class="title" x="470" y="330" text-anchor="middle">Index both files</text>
  <text class="subtitle" x="470" y="348" text-anchor="middle">in FTS5</text>

  <!-- Briefing path -->
  <text class="heading" x="20" y="404">Briefing path (conversation start)</text>
  <rect class="box-blue" x="20" y="416" width="150" height="36" rx="6"/>
  <text class="title" x="95" y="438" text-anchor="middle">LLM tool call</text>
  <line x1="170" y1="434" x2="200" y2="434" class="arr"/>

  <rect class="box-green" x="200" y="416" width="130" height="36" rx="6"/>
  <text class="title" x="265" y="438" text-anchor="middle">Read profile</text>
  <line x1="330" y1="434" x2="340" y2="434" class="arr"/>

  <rect class="box-amber" x="340" y="416" width="130" height="36" rx="6"/>
  <text class="title" x="405" y="438" text-anchor="middle">Query timeline</text>
  <line x1="470" y1="434" x2="480" y2="434" class="arr"/>

  <rect class="box" x="480" y="416" width="200" height="36" rx="6"/>
  <text class="title" x="580" y="438" text-anchor="middle">Return profile + activity</text>
</svg>
