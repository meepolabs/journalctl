<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
  <style>
    @media (prefers-color-scheme: light) {
      .tier-hot { fill: #FAECE7; stroke: #993C1D; }
      .tier-hot text { fill: #712B13; }
      .tier-hot text.sub { fill: #993C1D; }
      .tier-warm { fill: #FAEEDA; stroke: #854F0B; }
      .tier-warm text { fill: #633806; }
      .tier-warm text.sub { fill: #854F0B; }
      .tier-cold { fill: #E6F1FB; stroke: #185FA5; }
      .tier-cold text { fill: #0C447C; }
      .tier-cold text.sub { fill: #185FA5; }
      .label { fill: #888780; }
      .arrow { stroke: #888780; }
    }
    @media (prefers-color-scheme: dark) {
      .tier-hot { fill: #4A1B0C; stroke: #F0997B; }
      .tier-hot text { fill: #F5C4B3; }
      .tier-hot text.sub { fill: #F0997B; }
      .tier-warm { fill: #412402; stroke: #EF9F27; }
      .tier-warm text { fill: #FAC775; }
      .tier-warm text.sub { fill: #EF9F27; }
      .tier-cold { fill: #042C53; stroke: #85B7EB; }
      .tier-cold text { fill: #B5D4F4; }
      .tier-cold text.sub { fill: #85B7EB; }
      .label { fill: #B4B2A9; }
      .arrow { stroke: #B4B2A9; }
    }
    text { font-size: 14px; font-weight: 500; }
    text.sub { font-size: 12px; font-weight: 400; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Tier 1: Hot -->
  <rect class="tier-hot" x="40" y="30" width="600" height="80" rx="12" stroke-width="0.5"/>
  <text class="tier-hot" x="60" y="55" dominant-baseline="central">Tier 1 — Hot data</text>
  <text class="tier-hot sub" x="60" y="78" dominant-baseline="central">entry.content · ~50–100 tokens · Always loaded (briefings, searches)</text>
  <text class="label" x="580" y="55" text-anchor="end" dominant-baseline="central">entries table</text>

  <line x1="340" y1="110" x2="340" y2="140" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label" x="355" y="130" text-anchor="start">On-demand load</text>

  <!-- Tier 2: Warm -->
  <rect class="tier-warm" x="40" y="145" width="600" height="80" rx="12" stroke-width="0.5"/>
  <text class="tier-warm" x="60" y="170" dominant-baseline="central">Tier 2 — Warm data</text>
  <text class="tier-warm sub" x="60" y="193" dominant-baseline="central">entry.reasoning · ~200–500 tokens · Loaded via journal_read_topic</text>
  <text class="label" x="580" y="170" text-anchor="end" dominant-baseline="central">entries table</text>

  <line x1="340" y1="225" x2="340" y2="255" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label" x="355" y="245" text-anchor="start">Rarely accessed</text>

  <!-- Tier 3: Cold -->
  <rect class="tier-cold" x="40" y="260" width="600" height="100" rx="12" stroke-width="0.5"/>
  <text class="tier-cold" x="60" y="288" dominant-baseline="central">Tier 3 — Cold data</text>
  <text class="tier-cold sub" x="60" y="311" dominant-baseline="central">Conversation JSON · ~5k–100k tokens · Full chat transcripts</text>
  <text class="tier-cold sub" x="60" y="333" dominant-baseline="central">conversations_json/{id}.json + messages table · Archival / S3 backup</text>
  <text class="label" x="580" y="288" text-anchor="end" dominant-baseline="central">separate files</text>

  <text class="label" x="340" y="385" text-anchor="middle">Token budget increases ↓ · Access frequency decreases ↓</text>
</svg>
