<svg width="720" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">
  <style>
    .box-teal { fill: #e0f2f1; stroke: #80cbc4; stroke-width: 1; }
    .box-purple { fill: #f3e5f5; stroke: #ce93d8; stroke-width: 1; }
    .box-amber { fill: #fff8e1; stroke: #ffcc80; stroke-width: 1; }
    .box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
    .title { font-size: 14px; font-weight: 600; fill: #212529; }
    .subtitle { font-size: 12px; fill: #6c757d; }
    .arr { stroke: #adb5bd; stroke-width: 1.2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Journal column -->
  <rect class="box-teal" x="40" y="20" width="300" height="240" rx="12"/>
  <text class="title" x="190" y="48" text-anchor="middle">Journal (journalctl)</text>
  <text class="subtitle" x="190" y="68" text-anchor="middle">Historical record</text>

  <text class="subtitle" x="60" y="100">Stores:</text>
  <text class="subtitle" x="60" y="118">  Full conversations, dated entries,</text>
  <text class="subtitle" x="60" y="136">  decisions, reflections, research</text>

  <text class="subtitle" x="60" y="164">Search: FTS5 keyword (precise)</text>

  <text class="subtitle" x="60" y="192">Grows: Forever, never compacts</text>

  <text class="subtitle" x="60" y="220">Answers:</text>
  <text class="subtitle" x="60" y="238">  "What happened? What did I decide?"</text>

  <!-- Memory column -->
  <rect class="box-purple" x="380" y="20" width="300" height="240" rx="12"/>
  <text class="title" x="530" y="48" text-anchor="middle">Memory service (future)</text>
  <text class="subtitle" x="530" y="68" text-anchor="middle">Quick-recall facts</text>

  <text class="subtitle" x="400" y="100">Stores:</text>
  <text class="subtitle" x="400" y="118">  Facts, preferences, entity</text>
  <text class="subtitle" x="400" y="136">  relationships, patterns</text>

  <text class="subtitle" x="400" y="164">Search: Semantic (embeddings)</text>

  <text class="subtitle" x="400" y="192">Grows: Consolidates, updates,</text>
  <text class="subtitle" x="400" y="207">  replaces outdated facts</text>

  <text class="subtitle" x="400" y="235">Answers:</text>
  <text class="subtitle" x="400" y="253">  "What is X? What do I prefer?"</text>

  <!-- LLM orchestrator -->
  <rect class="box-amber" x="120" y="280" width="480" height="42" rx="8"/>
  <text class="title" x="360" y="305" text-anchor="middle">LLM (orchestrator — routes queries to journal or memory)</text>

  <!-- Arrows -->
  <line x1="240" y1="260" x2="240" y2="278" class="arr"/>
  <line x1="480" y1="260" x2="480" y2="278" class="arr"/>
</svg>
