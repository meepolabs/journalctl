<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
  <style>
    @media (prefers-color-scheme: light) {
      .bg-server { fill: #EEEDFE; stroke: #534AB7; }
      .bg-server text.title { fill: #3C3489; }
      .bg-auth { fill: #E1F5EE; stroke: #0F6E56; }
      .bg-auth text { fill: #085041; } .bg-auth text.sub { fill: #0F6E56; }
      .bg-tools { fill: #FAECE7; stroke: #993C1D; }
      .bg-tools text { fill: #712B13; } .bg-tools text.sub { fill: #993C1D; }
      .bg-db { fill: #E6F1FB; stroke: #185FA5; }
      .bg-db text { fill: #0C447C; } .bg-db text.sub { fill: #185FA5; }
      .bg-archive { fill: #FAEEDA; stroke: #854F0B; }
      .bg-archive text { fill: #633806; } .bg-archive text.sub { fill: #854F0B; }
      .bg-search { fill: #E1F5EE; stroke: #0F6E56; }
      .bg-search text { fill: #085041; }
      .bg-client { fill: #F1EFE8; stroke: #5F5E5A; }
      .bg-client text { fill: #444441; }
      .label { fill: #888780; } .arrow { stroke: #888780; }
    }
    @media (prefers-color-scheme: dark) {
      .bg-server { fill: #26215C; stroke: #AFA9EC; }
      .bg-server text.title { fill: #CECBF6; }
      .bg-auth { fill: #04342C; stroke: #5DCAA5; }
      .bg-auth text { fill: #9FE1CB; } .bg-auth text.sub { fill: #5DCAA5; }
      .bg-tools { fill: #4A1B0C; stroke: #F0997B; }
      .bg-tools text { fill: #F5C4B3; } .bg-tools text.sub { fill: #F0997B; }
      .bg-db { fill: #042C53; stroke: #85B7EB; }
      .bg-db text { fill: #B5D4F4; } .bg-db text.sub { fill: #85B7EB; }
      .bg-archive { fill: #412402; stroke: #EF9F27; }
      .bg-archive text { fill: #FAC775; } .bg-archive text.sub { fill: #EF9F27; }
      .bg-search { fill: #04342C; stroke: #5DCAA5; }
      .bg-search text { fill: #9FE1CB; }
      .bg-client { fill: #2C2C2A; stroke: #B4B2A9; }
      .bg-client text { fill: #D3D1C7; }
      .label { fill: #B4B2A9; } .arrow { stroke: #B4B2A9; }
    }
    text { font-size: 14px; font-weight: 500; }
    text.sub { font-size: 12px; font-weight: 400; }
    text.label { font-size: 12px; font-weight: 400; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="bg-client" x="60" y="30" width="130" height="44" rx="8" stroke-width="0.5"/>
  <text class="bg-client" x="125" y="56" text-anchor="middle" dominant-baseline="central">Claude.ai</text>
  <rect class="bg-client" x="220" y="30" width="130" height="44" rx="8" stroke-width="0.5"/>
  <text class="bg-client" x="285" y="56" text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <rect class="bg-client" x="380" y="30" width="130" height="44" rx="8" stroke-width="0.5"/>
  <text class="bg-client" x="445" y="56" text-anchor="middle" dominant-baseline="central">CLI / other</text>
  <text class="label" x="540" y="56" text-anchor="start">MCP clients</text>

  <line x1="125" y1="74" x2="125" y2="110" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="285" y1="74" x2="285" y2="110" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="445" y1="74" x2="445" y2="110" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label" x="285" y="98" text-anchor="middle">Streamable HTTP + Bearer / OAuth 2.0</text>

  <rect class="bg-server" x="40" y="115" width="530" height="120" rx="16" stroke-width="0.5"/>
  <text class="bg-server title" x="305" y="140" text-anchor="middle" dominant-baseline="central">FastAPI server (gunicorn workers)</text>

  <rect class="bg-auth" x="65" y="160" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="bg-auth" x="165" y="178" text-anchor="middle" dominant-baseline="central">Auth middleware</text>
  <text class="bg-auth sub" x="165" y="198" text-anchor="middle" dominant-baseline="central">API key + OAuth 2.0 PKCE</text>

  <rect class="bg-tools" x="295" y="160" width="250" height="56" rx="8" stroke-width="0.5"/>
  <text class="bg-tools" x="420" y="178" text-anchor="middle" dominant-baseline="central">13 MCP tools</text>
  <text class="bg-tools sub" x="420" y="198" text-anchor="middle" dominant-baseline="central">append, read, search, briefing...</text>

  <line x1="265" y1="188" x2="293" y2="188" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="180" y1="235" x2="180" y2="280" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="235" x2="420" y2="280" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect class="bg-db" x="60" y="285" width="240" height="80" rx="8" stroke-width="0.5"/>
  <text class="bg-db" x="180" y="308" text-anchor="middle" dominant-baseline="central">journal.db (SQLite)</text>
  <text class="bg-db sub" x="180" y="328" text-anchor="middle" dominant-baseline="central">topics, entries, conversations,</text>
  <text class="bg-db sub" x="180" y="344" text-anchor="middle" dominant-baseline="central">messages (canonical)</text>

  <rect class="bg-archive" x="330" y="285" width="240" height="80" rx="8" stroke-width="0.5"/>
  <text class="bg-archive" x="450" y="308" text-anchor="middle" dominant-baseline="central">Archival files</text>
  <text class="bg-archive sub" x="450" y="328" text-anchor="middle" dominant-baseline="central">conversations_json/{id}.json</text>
  <text class="bg-archive sub" x="450" y="344" text-anchor="middle" dominant-baseline="central">Rebuildable → S3 backup</text>

  <line x1="120" y1="365" x2="120" y2="400" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="365" x2="240" y2="400" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect class="bg-search" x="50" y="405" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="bg-search" x="120" y="427" text-anchor="middle" dominant-baseline="central">FTS5 index</text>
  <rect class="bg-search" x="210" y="405" width="170" height="44" rx="8" stroke-width="0.5"/>
  <text class="bg-search" x="295" y="427" text-anchor="middle" dominant-baseline="central">Semantic (ONNX)</text>
</svg>
