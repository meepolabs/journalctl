<svg width="720" viewBox="0 0 720 640" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">
  <style>
    .box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
    .box-accent { fill: #e8f4fd; stroke: #90caf9; stroke-width: 1; }
    .box-green { fill: #e8f5e9; stroke: #81c784; stroke-width: 1; }
    .box-amber { fill: #fff8e1; stroke: #ffcc80; stroke-width: 1; }
    .box-purple { fill: #f3e5f5; stroke: #ce93d8; stroke-width: 1; }
    .box-teal { fill: #e0f2f1; stroke: #80cbc4; stroke-width: 1; }
    .box-coral { fill: #fbe9e7; stroke: #ef9a9a; stroke-width: 1; }
    .box-dashed { fill: none; stroke: #adb5bd; stroke-width: 1; stroke-dasharray: 6 4; }
    .title { font-size: 14px; font-weight: 600; fill: #212529; }
    .subtitle { font-size: 12px; fill: #6c757d; }
    .label { font-size: 11px; fill: #868e96; }
    .arr { stroke: #adb5bd; stroke-width: 1.2; marker-end: url(#arrow); }
    .arr-label { font-size: 11px; fill: #868e96; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- MCP Clients row -->
  <rect class="box-purple" x="80" y="20" width="120" height="42" rx="8"/>
  <text class="title" x="140" y="45" text-anchor="middle">CLI tools</text>

  <rect class="box-purple" x="220" y="20" width="120" height="42" rx="8"/>
  <text class="title" x="280" y="45" text-anchor="middle">Desktop apps</text>

  <rect class="box-purple" x="360" y="20" width="120" height="42" rx="8"/>
  <text class="title" x="420" y="45" text-anchor="middle">Browser</text>

  <rect class="box-purple" x="500" y="20" width="120" height="42" rx="8"/>
  <text class="title" x="560" y="45" text-anchor="middle">Mobile</text>

  <!-- Protocol labels -->
  <text class="arr-label" x="200" y="80">API key</text>
  <text class="arr-label" x="450" y="80">OAuth 2.0</text>

  <!-- Arrows from clients -->
  <line x1="140" y1="62" x2="140" y2="100" class="arr"/>
  <line x1="280" y1="62" x2="280" y2="100" class="arr"/>
  <line x1="420" y1="62" x2="420" y2="100" class="arr"/>
  <line x1="560" y1="62" x2="560" y2="100" class="arr"/>

  <!-- MCP Protocol bar -->
  <rect class="box" x="140" y="90" width="420" height="26" rx="6"/>
  <text class="subtitle" x="350" y="107" text-anchor="middle">MCP protocol (streamable HTTP + Bearer token)</text>

  <!-- SSL / Proxy -->
  <line x1="350" y1="116" x2="350" y2="142" class="arr"/>
  <rect class="box-amber" x="180" y="142" width="340" height="42" rx="8"/>
  <text class="title" x="350" y="158" text-anchor="middle">SSL termination</text>
  <text class="subtitle" x="350" y="174" text-anchor="middle">Cloudflare, Caddy, or any TLS provider</text>

  <!-- nginx -->
  <line x1="350" y1="184" x2="350" y2="210" class="arr"/>
  <rect class="box-teal" x="140" y="210" width="420" height="42" rx="8"/>
  <text class="title" x="350" y="226" text-anchor="middle">Reverse proxy (nginx)</text>
  <text class="subtitle" x="350" y="242" text-anchor="middle">SSE passthrough · rate limiting · routing</text>

  <!-- Split arrows -->
  <line x1="260" y1="252" x2="260" y2="292" class="arr"/>
  <line x1="500" y1="252" x2="500" y2="292" class="arr"/>
  <text class="arr-label" x="260" y="282" text-anchor="middle">/mcp/*</text>
  <text class="arr-label" x="500" y="282" text-anchor="middle">/*</text>

  <!-- journalctl -->
  <rect class="box-accent" x="100" y="292" width="320" height="52" rx="8"/>
  <text class="title" x="260" y="312" text-anchor="middle">journalctl</text>
  <text class="subtitle" x="260" y="330" text-anchor="middle">FastAPI + FastMCP · 12 MCP tools · gunicorn</text>

  <!-- MkDocs -->
  <rect class="box-green" x="440" y="292" width="200" height="52" rx="8"/>
  <text class="title" x="540" y="312" text-anchor="middle">MkDocs Material</text>
  <text class="subtitle" x="540" y="330" text-anchor="middle">Browsable journal site</text>

  <!-- Arrows to storage -->
  <line x1="190" y1="344" x2="190" y2="390" class="arr"/>
  <line x1="330" y1="344" x2="330" y2="390" class="arr"/>

  <!-- MkDocs reads same mount -->
  <path d="M540 344 L540 370 L190 370 L190 390" fill="none" class="arr"/>
  <text class="arr-label" x="370" y="366" text-anchor="middle">same bind mount</text>

  <!-- Storage container -->
  <rect class="box-dashed" x="80" y="390" width="560" height="200" rx="14"/>
  <text class="title" x="360" y="414" text-anchor="middle">~/journal/ (bind mount, git-versioned)</text>

  <!-- Markdown -->
  <rect class="box-teal" x="100" y="432" width="170" height="70" rx="8"/>
  <text class="title" x="185" y="454" text-anchor="middle">Markdown files</text>
  <text class="subtitle" x="185" y="470" text-anchor="middle">topics/**/*.md</text>
  <text class="subtitle" x="185" y="486" text-anchor="middle">conversations/**/*.md</text>

  <!-- FTS5 -->
  <rect class="box" x="290" y="432" width="160" height="70" rx="8"/>
  <text class="title" x="370" y="454" text-anchor="middle">journal.db</text>
  <text class="subtitle" x="370" y="470" text-anchor="middle">FTS5 search index</text>
  <text class="subtitle" x="370" y="486" text-anchor="middle">Disposable, rebuildable</text>

  <!-- OAuth DB -->
  <rect class="box-coral" x="470" y="432" width="150" height="70" rx="8"/>
  <text class="title" x="545" y="454" text-anchor="middle">oauth.db</text>
  <text class="subtitle" x="545" y="470" text-anchor="middle">OAuth state</text>
  <text class="subtitle" x="545" y="486" text-anchor="middle">Persistent</text>

  <!-- Source of truth note -->
  <text class="subtitle" x="360" y="535" text-anchor="middle">Markdown is source of truth — delete journal.db anytime, rebuild with reindex</text>

  <!-- Git cron -->
  <line x1="185" y1="502" x2="185" y2="560" class="arr"/>
  <rect class="box" x="100" y="560" width="170" height="36" rx="8"/>
  <text class="subtitle" x="185" y="582" text-anchor="middle">daily cron → git push</text>
</svg>
